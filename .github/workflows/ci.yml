name: Marium MEXC - Complete CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  quality-assurance:
    name: 🛡️ Quality Assurance (Lint & Typecheck & Test)
    runs-on: ubuntu-latest
    steps:
      - name: 🛑 Checkout Repository
        uses: actions/checkout@v4

      - name: 🤌 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run Linter
        run: pnpm lint

      - name: 🛡️ TypeScript Type Check
        run: pnpm check

      - name: 🃏 Run Unit Tests
        run: pnpm test

      - name: 🏗️ Build Backend Server (esbuild)
        run: pnpm build

  eas-android-build:
    name: 🤖 EAS Android Build (APK & AAB)
    needs: quality-assurance
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🛑 Checkout Repository
        uses: actions/checkout@v4

      - name: 🤌 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Setup EAS CLI
        run: pnpm add -g eas-cli

      # لبدء البناء السحابي لنسخة الأندرويد، تأكد من إعداد EXPO_TOKEN في Secrets المستودع.
      - name: 🚀 Build Android APK / AAB via EAS (Cloud or Local)
        id: eas_build
        run: |
          if [ -n "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "🚀 EXPO_TOKEN is configured. Building on Expo Cloud..."
            echo "Building Preview APK..."
            pnpm dlx eas-cli build --platform android --profile preview --non-interactive
            echo "Building Production AAB..."
            pnpm dlx eas-cli build --platform android --profile production --non-interactive
          else
            echo "⚠️ EXPO_TOKEN not set. Running a local dry-run / credential setup..."
            echo "Please configure EXPO_TOKEN in your GitHub Secrets to run the full cloud build pipeline."
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 🚀 Create Automatic GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: Release v1.0.0 (Build ${{ github.run_number }})
          body: |
            ## Marium MEXC - Automated Release
            
            This release was automatically generated by the Complete CI/CD Pipeline.
            
            ### Artifacts & Downloads:
            - **Preview APK**: Downloadable via Expo Dashboard
            - **Production AAB**: Uploaded & Managed via EAS Build History
            
            ### Build Information:
            - **Triggered By**: ${{ github.actor }}
            - **Commit SHA**: ${{ github.sha }}
            - **Run Number**: ${{ github.run_number }}
            
            *Verify that EXPO_TOKEN and ANDROID_KEYSTORE_BASE64 are set in GitHub Secrets to access full signing and play-store readiness.*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

