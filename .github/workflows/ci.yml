name: CI with pnpm (Local Build)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🛑 Checkout Repository
        uses: actions/checkout@v4

      - name: 🤌 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: ☕ Setup Java (مطلوب للبناء المحلي)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # الإصدار المتوافق مع إصدارات Expo الحديثة للأندرويد

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build Android APK locally via EAS
        run: pnpm dlx eas-cli build --platform android --profile preview --local --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # ملاحظة: قد تحتاج لتمرير متغيرات بيئة إضافية لشهادات توقيع الأندرويد هنا
          
