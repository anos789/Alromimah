name: Marium MEXC - Complete CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  eas-ios-build-view:
    name: 🔍 View EAS iOS Build Logs
    runs-on: ubuntu-latest
    steps:
      - name: 🛑 Checkout Repository
        uses: actions/checkout@v4

      - name: 🤌 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Setup EAS CLI
        run: pnpm add -g eas-cli

      - name: 🔍 View Build Metadata
        run: |
          npx eas-cli build:view 533fb47c-ca96-44d5-9eaf-85d318474398 --json
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

