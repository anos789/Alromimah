name: CI with pnpm

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🛑 Checkout Repository
        uses: actions/checkout@v4

      - name: 🤌 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📥 Install Dependencies
        run: pnpm install

      - name: 🏗️ Build Android APK via EAS
        # استبدلنا exec بـ dlx لتنزيل الأداة وتشغيلها مباشرة دون الحاجة لتعريفها في package.json
        run: pnpm dlx eas-cli build --platform android --profile preview --local --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
