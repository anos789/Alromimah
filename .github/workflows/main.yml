name: Marium MEXC Android Build & Release CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Configure Secrets Environment
      run: |
        echo "=== Configuring Environment Variables ==="
        if [ ! -f ".env" ]; then
          if [ -f ".env.example" ]; then
            cp .env.example .env
            echo "Copied .env.example to .env"
          else
            touch .env
            echo "Created empty .env"
          fi
        fi

    - name: Prepare Keystore File for Signing
      run: |
        echo "=== Preparing Keystore for Release Signing ==="
        
        # Check if the keystore is provided via Secrets
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "Restoring keystore from GitHub Secrets KEYSTORE_BASE64..."
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/upload-keystore.jks
        # Check if keystore is already committed to the repository (e.g. upload-keystore.jks)
        elif [ -f "upload-keystore.jks" ]; then
          echo "Using existing upload-keystore.jks from repository..."
          cp upload-keystore.jks ${{ github.workspace }}/upload-keystore.jks
        elif [ -f "my-upload-key.jks" ]; then
          echo "Using existing my-upload-key.jks from repository..."
          cp my-upload-key.jks ${{ github.workspace }}/upload-keystore.jks
        # Fallback: Generate a real, signed, valid self-signed keystore on the fly so the build never fails!
        else
          echo "Keystore not found. Generating a valid self-signed keystore on-the-fly..."
          keytool -genkeypair -v \
            -keystore ${{ github.workspace }}/upload-keystore.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias "upload" \
            -storepass "malek-321" \
            -keypass "malek-321" \
            -dname "CN=Marium MEXC, OU=Marium, O=MEXC, L=Cairo, S=Cairo, C=EG"
        fi

    - name: Build Debug, Release APK and AAB
      run: |
        echo "=== Compiling and Building Marium MEXC ==="
        
        # We set execute permission for gradlew just in case
        if [ -f "./gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease bundleRelease --stacktrace 2>&1 | tee build_output.log
        else
          echo "gradlew wrapper not found. Initiating build using system Gradle..."
          gradle assembleDebug assembleRelease bundleRelease --stacktrace 2>&1 | tee build_output.log
        fi
        
        # Validate build completion
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "=== BUILD FAILED ==="
          exit 1
        fi
        echo "=== BUILD COMPLETED SUCCESSFULLY ==="
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/upload-keystore.jks
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'malek-321' }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'malek-321' }}

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: marium-mexc-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn

    - name: Upload Signed Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: marium-mexc-release-apk
        path: app/build/outputs/apk/release/app-release.apk
        if-no-files-found: error

    - name: Upload Signed Release AAB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: marium-mexc-release-aab
        path: app/build/outputs/bundle/release/*.aab
        if-no-files-found: error

    - name: Generate Diagnostics Summary on Failure
      if: failure()
      run: |
        echo "### 🔴 فشل بناء تطبيق Marium MEXC (Build Failed)" >> $GITHUB_STEP_SUMMARY
        echo "تعذر إتمام عملية التجميع التلقائية للبناء. يرجى مراجعة تفاصيل المشكلة أدناه لتصحيحها:" >> $GITHUB_STEP_SUMMARY
        echo "#### 🔍 سجل الأخطاء والتحذيرات المستخرجة:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
        if [ -f build_output.log ]; then
          grep -E "(e: file|FAILED|Compilation error|Unresolved reference|Syntax error|Cannot infer type)" build_output.log | tail -n 50 >> $GITHUB_STEP_SUMMARY
        else
          echo "لم يتم العثور على ملف مخرجات البناء build_output.log" >> $GITHUB_STEP_SUMMARY
        fi
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "#### 💡 توجيهات سريعة للمطور:" >> $GITHUB_STEP_SUMMARY
        echo "1. تأكد من أن جميع متغيرات البيئة مستوردة ومحددة." >> $GITHUB_STEP_SUMMARY
        echo "2. تأكد من توافق إصدارات SDK ومكونات Jetpack Compose المستخدمة." >> $GITHUB_STEP_SUMMARY
