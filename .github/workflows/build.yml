name: Android Docker Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build APK and AAB using Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image for CI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: alromimah-ci:latest

      - name: Restore signing keystore from secret
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > upload-keystore.jks
          else
            echo "No KEYSTORE_BASE64 secret is configured; fallback to KEYSTORE_PATH if provided."
          fi

      - name: Run Android build inside Docker
        run: |
          docker run --rm \
            -e STORE_PASSWORD="${{ secrets.STORE_PASSWORD }}" \
            -e KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
            -e KEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -e KEYSTORE_PATH="/workspace/upload-keystore.jks" \
            -v "${{ github.workspace }}":/workspace \
            alromimah-ci:latest bash -lc "
              cd /workspace
              chmod +x ./gradlew
              ./gradlew clean assembleRelease bundleRelease --no-daemon --stacktrace
            "

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: alromimah-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: alromimah-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
