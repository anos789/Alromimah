name: Build Android Release APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Prepare signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/upload-keystore.jks"
          elif [ -f "$GITHUB_WORKSPACE/app/upload-keystore.jks" ]; then
            cp "$GITHUB_WORKSPACE/app/upload-keystore.jks" "$GITHUB_WORKSPACE/upload-keystore.jks"
          else
            keytool -genkeypair -v \
              -keystore "$GITHUB_WORKSPACE/upload-keystore.jks" \
              -alias upload \
              -storepass malek-321 \
              -keypass malek-321 \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Alromimah, OU=Alromimah, O=Alromimah, L=Cairo, S=Cairo, C=EG"
          fi

      - name: Build release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'malek-321' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'malek-321' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'upload' }}
          KEYSTORE_PATH: ${{ github.workspace }}/upload-keystore.jks
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: alromimah-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
