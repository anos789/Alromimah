version: 2.1

orbs:
  android: circleci/android@3.2.0

jobs:
  build_and_deploy:
    executor:
      name: android/android_machine
      resource_class: medium
      tag: default
    environment:
      GRADLE_USER_HOME: ~/gradle
    steps:
      - checkout
      - restore_cache:
          keys:
            - gradle-v2-{{ checksum "gradle/wrapper/gradle-wrapper.properties" }}-{{ checksum "build.gradle.kts" }}-{{ checksum "app/build.gradle.kts" }}
            - gradle-v2-{{ checksum "gradle/wrapper/gradle-wrapper.properties" }}
            - gradle-v2-
      - run:
          name: Configure keystore
          command: |
            if [ -n "${CIRCLECI_KEYSTORE_BASE64}" ]; then
              echo "$CIRCLECI_KEYSTORE_BASE64" | base64 -d > upload-keystore.jks
            else
              keytool -genkeypair -v \
                -keystore upload-keystore.jks \
                -alias upload \
                -keyalg RSA \
                -keysize 2048 \
                -validity 10000 \
                -storepass "malek-321" \
                -keypass "malek-321" \
                -dname "CN=Alromimah, OU=Android, O=Alromimah, L=Unknown, S=Unknown, C=US"
            fi
            echo "sdk.dir=$ANDROID_HOME" > local.properties
      - run:
          name: Build Release APK and AAB
          command: |
            chmod +x ./gradlew
            ./gradlew clean assembleRelease bundleRelease --stacktrace
      - save_cache:
          key: gradle-v2-{{ checksum "gradle/wrapper/gradle-wrapper.properties" }}-{{ checksum "build.gradle.kts" }}-{{ checksum "app/build.gradle.kts" }}
          paths:
            - ~/gradle/wrapper
            - ~/gradle/caches
      - store_artifacts:
          path: app/build/outputs/apk/release
      - store_artifacts:
          path: app/build/outputs/bundle/release

workflows:
  build_and_deploy:
    jobs:
      - build_and_deploy
