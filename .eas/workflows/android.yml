name: Android EAS Build (APK)

on:
  push:
    branches:
      - main 

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
  EAS_TOKEN:  ${{ secrets.EXPO_TOKEN }}

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Check out repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: ⚙️ Setup Expo EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🔧 Compile app.config.ts to CommonJS for CI
        run: |
          # Ensure esbuild (devDependency) is available from node_modules
          pnpm exec -- esbuild app.config.ts --bundle --platform=node --outfile=app.config.cjs --format=cjs || true
          # If esbuild isn't available, fall back to a simple TypeScript transpile using npx (will install temporarily)
          if [ ! -f app.config.cjs ]; then
            echo "esbuild not available, using npx to transpile app.config.ts"
            npx -y -p typescript tsc --module commonjs --outFile app.config.cjs app.config.ts || true
          fi

      - name: 🛠 Link EAS Project Automatically
        run: npx eas-cli project:init --non-interactive --force

      - name: 🚀 Build APK on EAS
        run: eas build --platform android --profile preview --non-interactive

